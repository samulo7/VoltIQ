services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: voltiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voltiq}
      POSTGRES_USER: ${POSTGRES_USER:-voltiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voltiq_dev_password}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - voltiq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voltiq} -d ${POSTGRES_DB:-voltiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - voltiq-net

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    container_name: voltiq-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - voltiq_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - voltiq-net

volumes:
  voltiq_pg_data:
  voltiq_redis_data:

networks:
  voltiq-net:
    name: voltiq-net
